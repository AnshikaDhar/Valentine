<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jeopardy Night</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.screen { display: none; padding: 20px; }
.active { display: block; }

button {
  margin: 10px;
  padding: 12px 20px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.main-btn {
  display: block;
  width: 80%;
  margin: 15px auto;
}

.back {
  position: absolute;
  top: 10px;
  left: 10px;
}

#question {
  font-size: 26px;
  margin-top: 60px;
}

#answer {
  margin-top: 20px;
  font-size: 20px;
  color: #00ffcc;
  display: none;
}
</style>
</head>

<body>

<div id="menu" class="screen active">
  <h1>Choose Your Chaos 🎮</h1>
  <button class="main-btn" onclick="openGame('friends')">🔥 Spill The Tea</button>
  <button class="main-btn" onclick="openGame('general')">🎯 Brain Bender</button>
  <button class="main-btn" onclick="openGame('movies')">🎬 Popcorn Madness</button>
</div>

<div id="categories" class="screen">
  <button class="back" onclick="goMenu()">⬅</button>
  <h2>Select Category</h2>
  <div id="categoryButtons"></div>
</div>

<div id="game" class="screen">
  <button class="back" onclick="goMenu()">🏠 Menu</button>
  <div id="question"></div>
  <div id="answer"></div>

  <button onclick="showAnswer()">Show Answer</button>
  <button onclick="nextQuestion()">Next</button>
</div>

<script>

let currentQuestions = [];
let index = 0;

const data = {

friends: {

"😈 Most Likely To": [
{q:"Who's most likely to have a secret situationship?",a:"Group decides"},
{q:"Who's most likely to drunk text their ex?",a:"Group decides"},
{q:"Who's most likely to fall in love fast?",a:"Group decides"},
{q:"Who's most likely to have cried over someone here?",a:"Group decides"},
{q:"Who's most likely to ghost after a great date?",a:"Group decides"},
{q:"Who's most likely to marry someone family hates?",a:"Group decides"}
],

"💬 Truths": [
{q:"Most embarrassing thing you've done sober?",a:"Personal"},
{q:"Biggest insecurity?",a:"Personal"},
{q:"Last crush?",a:"Personal"},
{q:"Ever lied to someone in this room?",a:"Personal"},
{q:"Real reason last relationship ended?",a:"Personal"}
],

"🎯 Dares": [
{q:"Show your camera roll",a:"Do it"},
{q:"Text your ex",a:"Do it"},
{q:"Read last 5 Google searches",a:"Do it"},
{q:"Let group send a message from your phone",a:"Do it"}
],

"👀 Never Have I Ever": [
{q:"Stalked an ex for 20+ minutes",a:"Hands down"},
{q:"Had feelings for a friend",a:"Hands down"},
{q:"Lied in a relationship",a:"Hands down"},
{q:"Sent risky text",a:"Hands down"}
],

"🔥 Hot Takes": [
{q:"Love or money?",a:"Debate"},
{q:"Cheating forgivable?",a:"Debate"},
{q:"Casual dating toxic?",a:"Debate"},
{q:"Can you love two people?",a:"Debate"}
],

"⚡ Rapid Fire": [
{q:"Rate yourself /10",a:"Say it"},
{q:"Last lie you told?",a:"Say it"},
{q:"Biggest flaw in relationships?",a:"Say it"},
{q:"Who do you like right now?",a:"Say it"}
]

},

general: {

"🌍 Easy World": [
{q:"Capital of India?",a:"New Delhi"},
{q:"Largest ocean?",a:"Pacific"},
{q:"Which country is Taj Mahal in?",a:"India"}
],

"🧪 Easy Science": [
{q:"H2O is?",a:"Water"},
{q:"Sun is a?",a:"Star"},
{q:"Gas we breathe?",a:"Oxygen"}
]

},

movies: {

"🎥 Bollywood": [
{q:"Who played Kabir Singh?",a:"Shahid Kapoor"},
{q:"Geet is from?",a:"Jab We Met"},
{q:"SRK full name?",a:"Shah Rukh Khan"}
],

"🍿 Hollywood": [
{q:"Iron Man real name?",a:"Tony Stark"},
{q:"Harry Potter's school?",a:"Hogwarts"},
{q:"Titanic hero?",a:"Jack"}
],

"📺 TV Shows": [
{q:"Winter is Coming?",a:"Game of Thrones"},
{q:"Friends coffee shop?",a:"Central Perk"},
{q:"Money Heist mastermind?",a:"Professor"}
]

}

};


// FUNCTIONS

function openGame(type) {
  switchScreen("categories");

  let container = document.getElementById("categoryButtons");
  container.innerHTML = "";

  for (let key in data[type]) {
    let btn = document.createElement("button");
    btn.innerText = key;
    btn.onclick = () => startGame(data[type][key]);
    container.appendChild(btn);
  }
}

function startGame(questions) {
  currentQuestions = questions;
  index = 0;
  switchScreen("game");
  loadQuestion();
}

function loadQuestion() {
  if (index >= currentQuestions.length) {
    document.getElementById("question").innerText = "🎉 Round Complete!";
    document.getElementById("answer").style.display = "none";
    return;
  }

  document.getElementById("question").innerText = currentQuestions[index].q;
  document.getElementById("answer").innerText = currentQuestions[index].a;
  document.getElementById("answer").style.display = "none";
}

function showAnswer() {
  document.getElementById("answer").style.display = "block";
}

function nextQuestion() {
  index++;
  loadQuestion();
}

function goMenu() {
  switchScreen("menu");
}

function switchScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
