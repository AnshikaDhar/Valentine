<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jeopardy Night</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
}

.screen {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
.active { display: flex; }

button {
  margin: 10px;
  padding: 14px 24px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.main-btn {
  width: 80%;
  font-size: 18px;
}

.back {
  position: absolute;
  top: 15px;
  left: 15px;
}

#question {
  font-size: 32px;
  text-align: center;
  max-width: 85%;
}

#answer {
  margin-top: 20px;
  font-size: 20px;
  color: #00ffcc;
  display: none;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
  <h1>Choose Your Chaos 🎮</h1>
  <button class="main-btn" onclick="openGame('friends')">🔥 Spill The Tea</button>
  <button class="main-btn" onclick="openGame('general')">🎯 Brain Bender</button>
  <button class="main-btn" onclick="openGame('movies')">🎬 Popcorn Madness</button>
</div>

<!-- CATEGORY -->
<div id="categories" class="screen">
  <button class="back" onclick="goMenu()">⬅</button>
  <h2>Select Category</h2>
  <div id="categoryButtons"></div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <button class="back" onclick="goMenu()">🏠</button>

  <div id="question"></div>
  <div id="answer"></div>

  <button id="answerBtn" onclick="showAnswer()">Show Answer</button>
  <button onclick="nextQuestion()">Next</button>
</div>

<script>

let currentQuestions = [];
let index = 0;

const data = {

friends: {

"😈 Most Likely To": [
/* PASTE ALL YOUR QUESTIONS HERE (NO ANSWERS) */
"Who's most likely to ...",
"Who's most likely to ..."
],

"💬 Truths": [
/* PASTE ALL */
],

"🎯 Dares": [
/* PASTE ALL */
],

"👀 Never Have I Ever": [
/* PASTE ALL */
],

"🔥 Hot Takes": [
/* PASTE ALL */
],

"⚡ Rapid Fire": [
/* PASTE ALL */
]

},

general: {

"🌍 Geography": [
/* FORMAT: {q:"question", a:"answer"} */
{q:"Capital of France?",a:"Paris"}
],

"🧪 Science": [
/* PASTE ALL */
],

"🏛️ Politics": [
/* PASTE ALL */
],

"🧠 General Knowledge": [
/* PASTE ALL */
]

},

movies: {

"🎥 Bollywood": [
/* PASTE ALL */
],

"🍿 Hollywood": [
/* PASTE ALL */
],

"📺 Friends": [
/* PASTE ALL */
],

"🐉 Game of Thrones": [
/* PASTE ALL */
],

"💰 Money Heist": [
/* PASTE ALL */
],

"🧪 Breaking Bad": [
/* PASTE ALL */
]

}

};


// FUNCTIONS

function openGame(type) {
  switchScreen("categories");
  let container = document.getElementById("categoryButtons");
  container.innerHTML = "";

  for (let key in data[type]) {
    let btn = document.createElement("button");
    btn.innerText = key;
    btn.onclick = () => startGame(data[type][key], type === "friends");
    container.appendChild(btn);
  }
}

function startGame(questions, isFriends) {
  currentQuestions = questions;
  index = 0;

  document.getElementById("answerBtn").style.display = isFriends ? "none" : "inline-block";

  switchScreen("game");
  loadQuestion();
}

function loadQuestion() {
  if (index >= currentQuestions.length) {
    document.getElementById("question").innerText = "🎉 Round Complete!";
    document.getElementById("answer").style.display = "none";
    return;
  }

  let q = currentQuestions[index];

  if (typeof q === "string") {
    document.getElementById("question").innerText = q;
    document.getElementById("answer").style.display = "none";
  } else {
    document.getElementById("question").innerText = q.q;
    document.getElementById("answer").innerText = q.a;
    document.getElementById("answer").style.display = "none";
  }
}

function showAnswer() {
  document.getElementById("answer").style.display = "block";
}

function nextQuestion() {
  index++;
  loadQuestion();
}

function goMenu() {
  switchScreen("menu");
}

function switchScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
