<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jeopardy Night</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
}

.screen {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
.active { display: flex; }

button {
  margin: 10px;
  padding: 14px 24px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.main-btn {
  width: 80%;
  font-size: 18px;
}

.back {
  position: absolute;
  top: 15px;
  left: 15px;
}

#question {
  font-size: 30px;
  text-align: center;
  max-width: 85%;
}

#answer {
  margin-top: 20px;
  font-size: 20px;
  color: #00ffcc;
  display: none;
}
</style>
</head>

<body>

<div id="menu" class="screen active">
  <h1>Choose Your Chaos 🎮</h1>
  <button class="main-btn" onclick="openGame('friends')">🔥 Spill The Tea</button>
  <button class="main-btn" onclick="openGame('general')">🎯 Brain Bender</button>
  <button class="main-btn" onclick="openGame('movies')">🎬 Popcorn Madness</button>
</div>

<div id="categories" class="screen">
  <button class="back" onclick="goMenu()">⬅</button>
  <h2>Select Category</h2>
  <div id="categoryButtons"></div>
</div>

<div id="game" class="screen">
  <button class="back" onclick="goMenu()">🏠</button>

  <div id="question"></div>
  <div id="answer"></div>

  <button id="answerBtn" onclick="showAnswer()">Show Answer</button>
  <button onclick="nextQuestion()">Next</button>
</div>

<script>

let currentQuestions = [];
let index = 0;

const data = {

friends: {

"😈 Most Likely To": [
"Who's most likely to have a secret situationship?",
"Who's most likely to drunk text their ex?",
"Who's most likely to fall in love in 3 days?",
"Who's most likely to ghost after a perfect date?",
"Who's most likely to cry over someone here?",
"Who's most likely to marry someone family hates?",
"Who's most likely to send a risky text tonight?",
"Who's most likely to be secretly in love right now?"
],

"💬 Truths": [
"Most embarrassing thing you've done sober?",
"Biggest insecurity?",
"Last crush?",
"Ever lied to your best friend?",
"Real reason your last relationship ended?",
"Ever stalked someone for hours?",
"Ever liked someone in this room?"
],

"🎯 Dares": [
"Show your camera roll",
"Text your ex 'I miss you'",
"Read last 5 Google searches",
"Let group send a message from your phone",
"Call a random contact and say hi",
"Post something weird on your story"
],

"👀 Never Have I Ever": [
"Stalked an ex for 20+ minutes",
"Had feelings for a friend",
"Lied in a relationship",
"Sent a risky text",
"Checked someone’s phone secretly"
],

"🔥 Hot Takes": [
"Love or money?",
"Cheating forgivable?",
"Casual dating toxic?",
"Can you love two people at once?",
"Long distance relationships work?"
],

"⚡ Rapid Fire": [
"Rate yourself /10",
"Biggest red flag in you?",
"Who do you like right now?",
"Last lie you told?",
"Your type?"
]

},

general: {

"🌍 Geography": [
{q:"Capital of Australia?",a:"Canberra"},
{q:"Largest country in the world?",a:"Russia"},
{q:"Which continent is Egypt in?",a:"Africa"},
{q:"Which country has the Eiffel Tower?",a:"France"}
],

"🧪 Science": [
{q:"H2O is?",a:"Water"},
{q:"Red planet?",a:"Mars"},
{q:"Gas we breathe?",a:"Oxygen"},
{q:"Sun is a?",a:"Star"},
{q:"Human body bones?",a:"206"}
],

"🏛️ History & Politics": [
{q:"Who is PM of India?",a:"Narendra Modi"},
{q:"Father of nation India?",a:"Mahatma Gandhi"},
{q:"Indian parliament lower house?",a:"Lok Sabha"}
],

"🧠 General Knowledge": [
{q:"Fastest land animal?",a:"Cheetah"},
{q:"Currency of Japan?",a:"Yen"},
{q:"How many continents?",a:"7"}
]

},

movies: {

"🎥 Bollywood": [
{q:"Who played Kabir Singh?",a:"Shahid Kapoor"},
{q:"Geet is from?",a:"Jab We Met"},
{q:"SRK full name?",a:"Shah Rukh Khan"},
{q:"3 Idiots main actor?",a:"Aamir Khan"},
{q:"DDLJ heroine?",a:"Kajol"}
],

"🍿 Hollywood": [
{q:"Iron Man real name?",a:"Tony Stark"},
{q:"Titanic hero?",a:"Jack Dawson"},
{q:"Avatar director?",a:"James Cameron"},
{q:"Batman city?",a:"Gotham"},
{q:"Frozen main character?",a:"Elsa"}
],

"📺 Friends": [
{q:"Ross job?",a:"Paleontologist"},
{q:"Joey famous line?",a:"How you doin?"},
{q:"Coffee shop?",a:"Central Perk"}
],

"🐉 Game of Thrones": [
{q:"Winter is Coming belongs to?",a:"Stark"},
{q:"Dragon queen?",a:"Daenerys"},
{q:"Wall protects from?",a:"White Walkers"}
],

"💰 Money Heist": [
{q:"Professor real name?",a:"Sergio"},
{q:"Tokyo role?",a:"Narrator"},
{q:"City names represent?",a:"Code names"}
],

"🧪 Breaking Bad": [
{q:"Walter White alias?",a:"Heisenberg"},
{q:"Jesse catchphrase?",a:"Yeah bitch"},
{q:"Blue meth color?",a:"Blue"}
]

}

};


// LOGIC

function openGame(type) {
  switchScreen("categories");
  let container = document.getElementById("categoryButtons");
  container.innerHTML = "";

  for (let key in data[type]) {
    let btn = document.createElement("button");
    btn.innerText = key;
    btn.onclick = () => startGame(data[type][key], type === "friends");
    container.appendChild(btn);
  }
}

function startGame(questions, isFriends) {
  currentQuestions = questions;
  index = 0;

  document.getElementById("answerBtn").style.display = isFriends ? "none" : "inline-block";

  switchScreen("game");
  loadQuestion();
}

function loadQuestion() {
  if (index >= currentQuestions.length) {
    document.getElementById("question").innerText = "🎉 Round Complete!";
    document.getElementById("answer").style.display = "none";
    return;
  }

  let q = currentQuestions[index];

  if (typeof q === "string") {
    document.getElementById("question").innerText = q;
    document.getElementById("answer").style.display = "none";
  } else {
    document.getElementById("question").innerText = q.q;
    document.getElementById("answer").innerText = q.a;
    document.getElementById("answer").style.display = "none";
  }
}

function showAnswer() {
  document.getElementById("answer").style.display = "block";
}

function nextQuestion() {
  index++;
  loadQuestion();
}

function goMenu() {
  switchScreen("menu");
}

function switchScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
