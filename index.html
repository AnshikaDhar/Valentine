<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anshika’s Cheesy Corner</title>

<style>
body{
 margin:0;
 font-family: Arial, sans-serif;
 text-align:center;
 background: linear-gradient(135deg,#ffd6e7,#fff0f6);
 overflow:hidden;
}

#box{ margin-top:70px; padding:20px; }

h1{ color:#d63384; font-size:28px; }
p{ color:#6a040f; font-size:18px; }

button{
 padding:14px 22px;
 font-size:18px;
 border:none;
 border-radius:14px;
 margin:12px;
 cursor:pointer;
 box-shadow:0 6px 16px rgba(0,0,0,.15);
}

#yes{ background:#ff4d6d; color:white; }
#no{ background:#6c757d; color:white; position:relative; }

.heart{ position:fixed; bottom:-20px; font-size:22px; animation:float 6s linear forwards; }
@keyframes float{ to{ transform:translateY(-110vh); opacity:0;} }

/* Teddy kiss bar */
.teddy-bar{
 position:fixed;
 left:0; right:0; bottom:0;
 display:flex; justify-content:center; gap:14px;
 padding:10px 0; background:linear-gradient(180deg, rgba(255,240,246,0.4), rgba(255,240,246,0.85));
 pointer-events:none;
}
.teddy{
 font-size:36px; display:inline-block; transform-origin:center bottom; opacity:0.95;
}
.kiss{ animation:kissAnim 2s linear infinite; }
.kiss.delay{ animation-delay:.4s }
@keyframes kissAnim{
 0%{ transform:translateY(0) scale(1); }
 25%{ transform:translateY(-6px) scale(1.05); }
 50%{ transform:translateY(0) scale(1); }
 65%{ transform:translateY(-3px) rotate(-6deg) scale(1.02); }
 100%{ transform:translateY(0) scale(1); }
}

/* Live emoji bubble */
.emoji-bubble{
 position:fixed; font-size:26px; pointer-events:none; will-change:transform,opacity;
 transform:translate(-50%,-50%) scale(1);
 animation:rise 1800ms ease-out forwards;
}
@keyframes rise{
  0%{ transform:translate(-50%,-50%) translateY(0) scale(0.9); opacity:0; }
  15%{ opacity:1; transform:translate(-50%,-50%) translateY(-6px) scale(1.06); }
  65%{ transform:translate(-50%,-50%) translateY(-80px) rotate(-8deg) scale(1); opacity:1; }
  100%{ transform:translate(-50%,-50%) translateY(-160px) rotate(12deg) scale(0.8); opacity:0; }
}

/* Small responsiveness */
@media (max-width:420px){ .teddy{ font-size:28px } .emoji-bubble{ font-size:22px } }
</style>
</head>

<body>

<div id="box">
<h1 id="q">Will you be my Valentine? 💌</h1>
<p id="sub">This message was sent with excessive cuteness 🥺</p>

<button id="yes">YES 💖 obviously</button>
<button id="no">No 🙈 (suspicious choice)</button>

<!-- Link kept for Anshika’s Cheesy Corner (optional) -->
<p><a id="visit-link" href="https://example.com" target="_blank" rel="noopener noreferrer">Anshika’s Cheesy Corner</a></p>
</div>

<!-- Teddy kiss bar (always visible) -->
<div class="teddy-bar" aria-hidden="true">
 <div class="teddy kiss">🧸💋</div>
 <div class="teddy kiss delay">🧸💋</div>
 <div class="teddy kiss">🧸💋</div>
</div>

<script>
var yes=document.getElementById("yes");
var no=document.getElementById("no");
var q=document.getElementById("q");
var sub=document.getElementById("sub");

// Emoji pools for live spawn
var livePool = ["💖","💗","😘","🥰","💋","🧸","🌸","✨","🧁"];

function spawnEmoji(x, y, count){
 for(let i=0;i<count;i++){ 
   const e = document.createElement('div');
   e.className = 'emoji-bubble';
   e.textContent = livePool[Math.floor(Math.random()*livePool.length)];
   // jitter positions slightly
   const jitterX = (Math.random()*80 - 40);
   const jitterY = (Math.random()*40 - 10);
   e.style.left = (x + jitterX) + 'px';
   e.style.top = (y + jitterY) + 'px';
   // random scale
   e.style.fontSize = (20 + Math.floor(Math.random()*20)) + 'px';
   document.body.appendChild(e);
   // remove after animation
   setTimeout(()=> e.remove(), 2000 + Math.floor(Math.random()*800));
 }
}

// Spawn from center if coordinates not provided
function spawnFromCenter(count){
 const cx = window.innerWidth/2 + (Math.random()*120 - 60);
 const cy = window.innerHeight/2 + (Math.random()*40 - 20);
 spawnEmoji(cx, cy, count);
}

// Add click listeners to buttons to spawn multiple emojis and perform existing behaviors
yes.onclick = function(e){
 // spawn a happy burst
 spawnFromCenter(10);
 // existing celebration: replace with cute message
 document.body.innerHTML = "<div style='margin-top:120px'><h1>YAYYYYYY 💖</h1><p>You just unlocked Valentine Mode 🥰</p><h2>Prepare for cute chaos 🌸</h2><p>Screenshot this — it’s official now 😌</p></div>";
};

no.onclick = function(e){
 // spawn a smaller, persuasive burst from the button position
 const rect = no.getBoundingClientRect();
 spawnEmoji(rect.left + rect.width/2, rect.top + rect.height/2, 6);
 // playful message update
 const msgs = [
  "Fine. I'll just text you every cute photo until you cave 😅",
  "You're saving a spot in your heart — I can tell 🥰",
  "I see your maybe. I raise you one playlist and a cheesy pun 🎶🧀",
  "This is an official request: be adorable and reconsider 😉",
  "I have receipts of your cutest moments — consider them leverage 📸",
  "One yes equals lifetime snack-sharing privileges 🍪"
 ];
 q.innerText = msgs[Math.floor(Math.random()*msgs.length)];
 sub.innerText = "Your NO is being reviewed by the romance department 💌";
 // make the yes button slightly bounce
 yes.style.transform = 'scale(1.08)';
 setTimeout(()=> yes.style.transform = '', 220);
};

// Also spawn small floating emojis continuously for ambient 'live' feel
setInterval(()=>{
 const side = Math.random();
 const x = side < 0.5 ? Math.random()*120 : window.innerWidth - Math.random()*120;
 const y = window.innerHeight - 40;
 spawnEmoji(x, y, 1);
}, 900);

// Also allow clicks anywhere to spawn a cute emoji at pointer location
document.addEventListener('click', function(ev){
 // ignore clicks on the buttons themselves (they already spawn)
 if(ev.target === yes || ev.target === no) return;
 spawnEmoji(ev.clientX, ev.clientY, 3);
});
</script>

</body>
</html>
