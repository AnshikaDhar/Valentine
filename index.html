<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anshika’s Cheesy Corner</title>

<style>
body{
 margin:0;
 font-family: Arial, sans-serif;
 text-align:center;
 background: linear-gradient(135deg,#ffd6e7,#fff0f6);
 overflow:hidden;
}

#box{ margin-top:70px; padding:20px; }

h1{ color:#d63384; font-size:28px; }
p{ color:#6a040f; font-size:18px; }

button{
 padding:14px 22px;
 font-size:18px;
 border:none;
 border-radius:14px;
 margin:12px;
 cursor:pointer;
 box-shadow:0 6px 16px rgba(0,0,0,.15);
}

#yes{ background:#ff4d6d; color:white; }
#no{ background:#6c757d; color:white; position:relative; }

.heart{
 position:fixed;
 bottom:-20px;
 font-size:22px;
 animation:float 6s linear forwards;
}

@keyframes float{
 to{ transform:translateY(-110vh); opacity:0;}
}
</style>
</head>

<body>

<div id="box">
<h1 id="q">Will you be my Valentine? 💌</h1>
<p id="sub">This message was sent with excessive cuteness 🥺</p>

<button id="yes">YES 💖 obviously</button>
<button id="no">No 🙈 (suspicious choice)</button>
</div>

<script>
var yes=document.getElementById("yes");
var no=document.getElementById("no");
var q=document.getElementById("q");
var sub=document.getElementById("sub");

var size=18, step=0;

var msgs=[
"Are you suuuure? 🥺",
"My heart just skipped 😭",
"We would look cute together 😌",
"I already told the stars ✨",
"Chocolate + hugs included 🍫",
"This is getting awkward 😳",
"System rejecting NO ❌",
"Button emotionally damaged 💔",
"Last chance human 😤",
"But your smile is my favorite song 🎶",
"Promise: unlimited cheesy jokes 🧀",
"Think of puppies and rainbows 🐶🌈",
"I baked feelings today (and cookies) 🍪",
"Please? I brought virtual flowers 🌸",
"If you say NO, I’ll send more hearts 💘",
"This is a love emergency 🚨",
"My emoji collection approves ❤️",
"We could be a viral cute duo 😍",
"I whispered your name to the moon 🌙",
"You + me = adorable math 💕",
"Accept and receive a lifetime supply of smiles 😊",
"I have good cuddling references 🐻",
"Saying YES supports local romance 🌷",
"Your laugh is my favorite playlist 🎧",
"There's a secret handshake if you say yes 🤝",
"I wrote your name on a paper heart ✂️",
"Your NO made my confetti machine work harder 🎉",
"Objectively, we would be the cutest team 🏆",
"My heart did a tiny dance for you 💃",
"One YES equals one big hug (guaranteed) 🤗",
"Consider this a soft, persistent romance bug 🐞",
"Fine print: cuddles mandatory on Tuesdays 🗓️",
"If you say yes, I’ll stop sending pleading gifs (maybe) 😅",
"This button is 73% persuasive and 100% sincere 💌",
"You’re the cherry on my cupcake 🍒",
"P.S. I make excellent playlists 🎵",
"Also, I can share snacks — proven fact 🍫",
"Say yes and we’ll star in our own romcom 🎬",
"I’ll serenade you with squeaky toy sounds (if needed) 🎤"
];

function heart(){
 let h=document.createElement("div");
 h.className="heart";
 h.innerHTML=["💖","💗","💘","💝","✨","🌸"][Math.floor(Math.random()*6)];
 h.style.left=Math.random()*100+"vw";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
}
setInterval(heart,400);

yes.onclick=function(){
 document.body.innerHTML=
 "<div style='margin-top:120px'>\
 <h1>YAYYYYYY 💖</h1>\
 <p>You just unlocked Valentine Mode 🥰</p>\
 <h2>Prepare for cute chaos 🌸</h2>\
 <p>Screenshot this — it’s official now 😌</p>\
 </div>";
};

no.onclick=function(){
 q.innerText=msgs[step%msgs.length];
 sub.innerText="Your NO is being reviewed by the romance department 💌";
 step++;

 // subtle playful effects for the YES button
 size+=4;
 yes.style.fontSize=size+"px";
 yes.innerText="YES 💖 YES 💖";

 // jitter the NO button around playfully
 no.style.transform = "translate(" + (Math.random()*140-70) + "px," + (Math.random()*80-40) + "px) rotate(" + (Math.random()*20-10) + "deg)";
 // add a brief wobble
 no.style.transition = "transform 220ms ease";
};
</script>

</body>
</html>
