<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Galentine's Giggles — Anshika</title>

<!-- tiny confetti lib for celebration -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<style>
  :root{
    --bg1: #fff0f6;
    --bg2: #fce7f3;
    --accent: #ff66a3;
    --muted: #6b2b3b;
    --card: rgba(255,255,255,0.8);
  }
  html,body{height:100%; margin:0;}
  body{
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    background: linear-gradient(135deg,var(--bg1),var(--bg2));
    color:var(--muted);
    text-align:center;
    padding:24px;
    box-sizing:border-box;
    overflow:hidden;
  }

  .card{
    width:min(820px,96%);
    background:var(--card);
    border-radius:18px;
    padding:28px;
    box-shadow:0 12px 40px rgba(177,59,115,0.14);
    backdrop-filter: blur(6px);
  }

  h1{ margin:0 0 8px 0; color:var(--accent); font-size:28px; }
  p.lead{ margin:0 0 18px 0; font-size:16px; color:#5a2430; }

  .buttons{ margin-top:14px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  button{
    cursor:pointer;
    border:0;
    border-radius:12px;
    padding:12px 18px;
    font-size:16px;
    box-shadow:0 8px 22px rgba(0,0,0,0.08);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  button:active{ transform:translateY(2px); }
  .yes{
    background:linear-gradient(90deg,#ff7ab6,#ff5f99);
    color:white;
  }
  .maybe{
    background:#ffdbe9;
    color:#6b2433;
  }

  .floating{
    position:fixed;
    bottom:-24px;
    font-size:20px;
    animation:floatUp var(--duration,6s) linear forwards;
    pointer-events:none;
  }
  @keyframes floatUp{
    to{ transform:translateY(-115vh) rotate(20deg); opacity:0; }
  }

  .msg{
    margin-top:18px;
    min-height:56px;
    font-size:15px;
    color:#4b1f2a;
  }

  /* small responsive tweaks */
  @media (max-width:420px){
    h1{ font-size:22px; }
    button{ padding:10px 14px; font-size:15px; }
  }
</style>
</head>
<body>

<div class="card" role="main" aria-labelledby="title">
  <h1 id="title">Galentine's Giggles — Anshika</h1>
  <p class="lead">Host a tiny, cozy celebration for your besties. Would you join my Galentine's party? 💕</p>

  <div class="buttons" aria-hidden="false">
    <button id="join" class="yes">Count me in 💃</button>
    <button id="later" class="maybe">Maybe later 🤷‍♀️</button>
  </div>

  <div class="msg" id="message">P.S. There will be cheesy jokes, playlists, and virtual cupcakes 🍰</div>
</div>

<script>
  const joinBtn = document.getElementById('join');
  const laterBtn = document.getElementById('later');
  const msgEl = document.getElementById('message');

  // Lots of cute / encouraging messages for the "Maybe later" button
  const maybeMsgs = [
    "A tiny promise: snuggles and snacks are included 🧁",
    "No pressure — just good vibes and bad puns 😄",
    "Bring your best playlist; I'll bring the cheesy jokes 🎧🧀",
    "We'll make a memory and maybe a meme or two 📸",
    "Pajamas encouraged. Formality discouraged 🛋️",
    "I baked optimism and a dozen cookies (virtually) 🍪",
    "We'll trade compliments like they're stickers ✨",
    "There will be a group hug — socially sweet 🤗",
    "Side quest: make someone laugh — high reward 😍",
    "Confetti is non-negotiable — sparkle included 🎉",
    "Think of it as a cozy upgrade to your day ☕🫶",
    "I promise the playlists are 100% vibe-approved 🎵",
    "Wear a goofy hat. It helps with decisions 🎩",
    "If you come, I’ll dedicate a cheesy song to you 🎶",
    "No RSVP required — just bring your bright self 🌼",
    "We’ll rate snacks on a scale from meh to magical 🍫",
    "Your smile gets a standing ovation here 👏",
    "If you say yes, I'll reveal my signature dance move 💃",
    "We can invent a secret handshake (virtual-friendly) 🤝",
    "Guaranteed giggles or I’ll send extra cupcake emojis 🧁",
    "You + us = instant cozy content for the heart ❤️",
    "We’ll build a tiny kingdom of inside jokes 👑",
    "Consider this an official cheer squad sign-up 📣",
    "We’ll trade recipe secrets and terrible life hacks 🍳",
    "Accept and receive unlimited warm fuzzy feelings 🥰",
    "If you pause, we’ll play your favorite song next 🎶",
    "Bring your best 'remember when' story — we love nostalgia 🕰️",
    "Your maybe is adorable — but a yes is legendary ✨",
    "Pop in for five minutes; stay for the laughs ⏱️",
    "Flex your snack-sharing skills and win hearts 🥨"
  ];

  // Make floating emojis for ambient fun
  function spawnFloating(){
    const f = document.createElement('div');
    f.className = 'floating';
    const pool = ["💖","🌸","✨","🧁","🥂","💐","🎀","🎉"];
    f.textContent = pool[Math.floor(Math.random() * pool.length)];
    f.style.left = (Math.random() * 94 + 3) + 'vw';
    f.style.setProperty('--duration', (4 + Math.random()*4) + 's');
    document.body.appendChild(f);
    setTimeout(()=> f.remove(), 7000);
  }
  setInterval(spawnFloating, 450);

  // Celebration when joining
  joinBtn.addEventListener('click', () => {
    // confetti burst
    confetti({
      particleCount: 120,
      spread: 70,
      origin: { y: 0.55 }
    });
    // small follow-up celebration
    setTimeout(() => confetti({ particleCount: 80, spread: 100, origin: { x: 0.2, y: 0.3 } }), 250);
    setTimeout(() => confetti({ particleCount: 80, spread: 100, origin: { x: 0.8, y: 0.3 } }), 350);

    // show a cute join screen
    document.body.innerHTML = `
      <div style="display:flex;height:100vh;align-items:center;justify-content:center;">
        <div style="text-align:center;padding:28px;border-radius:14px;background:rgba(255,255,255,0.9);box-shadow:0 12px 40px rgba(0,0,0,0.08);max-width:720px;">
          <h1 style="color: #ff4d84;margin-bottom:6px;">Yesss — Galentine's Party! 💖</h1>
          <p style="color:#4b1f2a;margin-top:0;">You just made the best decision — get ready for cozy vibes, cheesy jokes, and endless celebration 🥂</p>
          <p style="margin-top:8px;color:#6b2433;">Screenshot this as your official welcome card ✨</p>
        </div>
      </div>
    `;
  });

  // "Maybe later" cycles through many messages; uses randomization to keep it fun
  laterBtn.addEventListener('click', () => {
    // pick a random message but avoid immediate repeats
    let idx = Math.floor(Math.random() * maybeMsgs.length);
    msgEl.textContent = maybeMsgs[idx];

    // playful button wiggle / grow to encourage a yes
    joinBtn.style.transform = `scale(${1 + Math.random()*0.12})`;
    joinBtn.style.transition = 'transform 220ms ease';

    // tiny bounce for later button
    laterBtn.style.transform = `translate(${(Math.random()*24-12)}px, ${(Math.random()*12-6)}px) rotate(${(Math.random()*10-5)}deg)`;
    laterBtn.style.transition = 'transform 220ms ease';

    // occasionally spawn a little extra confetti to sweeten the nudge (1 in 6)
    if (Math.random() < 1/6) {
      confetti({ particleCount: 30, spread: 40, origin: { y: 0.6 } });
    }
  });

  // reset join button transform after small delay (keeps UI tidy)
  document.addEventListener('transitionend', (e) => {
    if(e.propertyName === 'transform'){
      joinBtn.style.transform = '';
      laterBtn.style.transform = '';
    }
  });

</script>
</body>
</html>
